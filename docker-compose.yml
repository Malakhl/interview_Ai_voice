# Smart Voice Interviewer – Docker Compose (local development)
#
# This file is for LOCAL DEVELOPMENT ONLY.
# Production runs in Kubernetes – see k8s/ manifests.
#
# Usage:
#   docker compose up --build
#   docker compose down -v          # also removes the pg_data volume

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-svi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-smart_interviewer}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-svi} -d ${POSTGRES_DB:-smart_interviewer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-svi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smart_interviewer}
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # ⚠️ التعديل الضروري: الكود ديالك كايقلب فـ الجذر (/) ديال الـ Container
      KB_FILE: /final_knowledge_base.csv
      COURSES_FILE: /course_catalog.csv
      
    volumes:
      # كنربطو الملفات اللي حدا docker-compose مباشرة مع الجذر (/) ديال الـ Container
      - ./final_knowledge_base.csv:/final_knowledge_base.csv:ro
      - ./course_catalog.csv:/course_catalog.csv:ro
      
      # ربط الـ Models (حيت عندك دوسي models حدا docker-compose)
      - ./models:/app/models:ro
      
      # Cache ديال Hugging Face
      - hf_cache:/app/.cache/huggingface
      
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pg_data:
  hf_cache: